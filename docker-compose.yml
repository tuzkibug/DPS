version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - REDIS_ADDR=localhost:${REDIS_PORT:-6379}
      - SQLITE_PATH=/data/data.db
      - UPLOAD_DIR=/uploads
      - PCAP_DIR=/pcap
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    volumes:
      - ./pcap:/pcap
      - ./data:/data
      - ./uploads:/uploads
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8080}/api/v1/tasks"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8080}
    depends_on:
      - backend

volumes:
  redis_data:
